<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고리즘 퀘스트: 중1 정보 수업</title>
    <!-- 웹 폰트 적용 (게임 느낌의 굵은 폰트와 깔끔한 본문 폰트) -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            /* 심해/우주 느낌의 다크 그라데이션 배경 */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        .header-container {
            margin-bottom: 50px;
            animation: slideDown 1s ease-out;
        }
        h1 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3.5rem;
            color: #f1c40f;
            text-shadow: 0 4px 10px rgba(241, 196, 15, 0.5), 0 0 20px rgba(241, 196, 15, 0.3);
            letter-spacing: 2px;
            margin: 0 0 15px 0;
        }
        p.subtitle {
            font-size: 1.2rem;
            color: #ecf0f1;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .menu-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            max-width: 1000px;
            padding: 20px;
            perspective: 1000px;
        }
        /* 글래스모피즘(유리) 스타일의 카드 디자인 */
        .menu-card {
            width: 220px;
            padding: 35px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }
        /* 카드 마우스 오버 시 빛이 지나가는 효과 */
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .menu-card:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: #00d2ff;
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
        }
        .menu-card:hover::before {
            left: 100%;
        }
        /* 스테이지 뱃지 디자인 */
        .step-badge {
            display: inline-block;
            color: white;
            font-weight: 900;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        /* 각 스테이지별 테마 컬러 적용 */
        .menu-card:nth-child(1) .step-badge { background: linear-gradient(45deg, #ff416c, #ff4b2b); box-shadow: 0 4px 10px rgba(255, 65, 108, 0.4); }
        .menu-card:nth-child(2) .step-badge { background: linear-gradient(45deg, #f7b733, #fc4a1a); box-shadow: 0 4px 10px rgba(252, 74, 26, 0.4); }
        .menu-card:nth-child(3) .step-badge { background: linear-gradient(45deg, #00b09b, #96c93d); box-shadow: 0 4px 10px rgba(0, 176, 155, 0.4); }
        .menu-card:nth-child(4) .step-badge { background: linear-gradient(45deg, #36d1dc, #5b86e5); box-shadow: 0 4px 10px rgba(54, 209, 220, 0.4); }
        
        .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
            transition: transform 0.3s;
        }
        .menu-card:hover .icon {
            transform: scale(1.2);
        }
        .menu-card p {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.5;
            color: #e0e0e0;
            word-break: keep-all;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>추상화와 알고리즘</h1>
        <p class="subtitle">🎮 오늘의 수업 주제를 선택하세요!</p>
    </div>
    
    <div class="menu-container">
        <div class="menu-card" onclick="location.href='구조화.html'">
            <div class="step-badge">STAGE 1</div>
            <span class="icon">🧩</span>
            <p>문제의 상태와<br>구조화</p>
        </div>
        
        <div class="menu-card" onclick="location.href='추상화.html'">
            <div class="step-badge">STAGE 2</div>
            <span class="icon">🔍</span>
            <p>문제의 핵심 파악<br>추상화</p>
        </div>
        
        <div class="menu-card" onclick="location.href='알고리즘.html'">
            <div class="step-badge">STAGE 3</div>
            <span class="icon">⚙️</span>
            <p>알고리즘의<br>이해와 표현</p>
        </div>
        
        <div class="menu-card" onclick="location.href='분석.html'">
            <div class="step-badge">STAGE 4</div>
            <span class="icon">🗺️</span>
            <p>분석과 설계<br>(순서도 그리기)</p>
        </div>
    </div>
</body>
</html>
